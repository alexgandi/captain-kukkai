<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport per il gioco: niente zoom con le dita (i tap sono comandi),
         e usa tutta l'area utile anche sotto il "notch" del telefono -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <!-- Se aggiunto alla schermata Home, si comporta come un'app a schermo intero -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Captain Kukkai" />
    <!-- PWA: icona vera sulla Home + installabile come app -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <title>Captain &amp; Teacher Kukkai</title>
    <style>
      /* A tutto schermo, niente scroll/rimbalzo, niente selezione del testo:
         così su cellulare il dito muove il personaggio e non "trascina" la pagina */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* 100dvh: l'altezza VERA del viewport sui telefoni (la barra indirizzi
           che appare/scompare non lascia strisce vuote) */
        height: 100dvh;
        overflow: hidden;
        background: #1a1a2e;
        font-family: sans-serif;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        /* Niente flash blu al tocco né menu "copia/condividi" tenendo premuto:
           su iPhone/Android i tocchi sono COMANDI di gioco, non gesti web. */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Phaser (Scale.FIT) centra e ridimensiona il canvas dentro questo contenitore */
      #game {
        width: 100%;
        height: 100%;
      }
      #game canvas {
        display: block;
      }
      /* Sonda invisibile per leggere da JS gli insets della safe area (notch):
         main.js ne legge i padding calcolati e sposta l'HUD di conseguenza. */
      #safe-probe {
        position: fixed;
        visibility: hidden;
        pointer-events: none;
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      /* Il gioco è in ORIZZONTALE: in verticale un velo gentile chiede di
         ruotare il telefono (inglese + thai, con animazione). Niente JS.
         pointer-events: none SEMPRE — è solo informativo: appena il telefono
         viene ruotato, i tocchi devono già passare al gioco sottostante. */
      #rotate {
        display: none;
        pointer-events: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          position: fixed;
          inset: 0;
          z-index: 99;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          background: #1a1a2e;
          color: #ffffff;
          text-align: center;
        }
      }
      #rotate .phone {
        font-size: 64px;
        animation: tilt 1.6s ease-in-out infinite;
      }
      @keyframes tilt {
        0%, 20% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(90deg); }
      }
      #rotate p {
        margin: 0;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="safe-probe"></div>
    <div id="rotate">
      <div class="phone">📱</div>
      <p>Turn your phone! 🔄</p>
      <p>หมุนโทรศัพท์นะ</p>
    </div>
    <!-- Punto di ingresso: Vite carica questo modulo JS -->
    <script type="module" src="/src/main.js"></script>
    <!-- OFFLINE: il service worker mette in cache il gioco alla prima visita,
         così poi funziona anche senza internet (aereo, macchina, ovunque). -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
